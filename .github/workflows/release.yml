name: Release
on:
  push:
    tags: ["v*.*.*"]
permissions:
  contents: read
jobs:
  linux-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.95.0
          targets: x86_64-unknown-linux-musl
      - run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: cargo build --release --locked --target x86_64-unknown-linux-musl -p frostbuild-cli -p frostbuild-daemon
      - name: Package static Linux archive
        shell: bash
        run: |
          archive="frostbuild-${GITHUB_REF_NAME}-x86_64-unknown-linux-musl"
          mkdir -p "dist/${archive}"
          cp target/x86_64-unknown-linux-musl/release/frost "dist/${archive}/"
          cp target/x86_64-unknown-linux-musl/release/frostd "dist/${archive}/"
          cp README.md LICENSE "dist/${archive}/"
          "dist/${archive}/frost" --version
          tar -C dist -czf "dist/${archive}.tar.gz" "${archive}"
          rm -rf "dist/${archive}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-linux-musl
          path: dist/*.tar.gz
          if-no-files-found: error

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.95.0
      - run: cargo build --release --locked -p frostbuild-cli -p frostbuild-daemon
      - name: Package macOS archive
        shell: bash
        run: |
          host="$(rustc -vV | sed -n 's/^host: //p')"
          archive="frostbuild-${GITHUB_REF_NAME}-${host}"
          mkdir -p "dist/${archive}"
          cp target/release/frost target/release/frostd "dist/${archive}/"
          cp README.md LICENSE "dist/${archive}/"
          "dist/${archive}/frost" --version
          tar -C dist -czf "dist/${archive}.tar.gz" "${archive}"
          rm -rf "dist/${archive}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-macos
          path: dist/*.tar.gz
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.95.0
      - run: cargo build --release --locked -p frostbuild-cli -p frostbuild-daemon
      - name: Package Windows archive
        shell: pwsh
        run: |
          $hostTriple = ((rustc -vV | Select-String '^host:').Line -replace '^host: ', '')
          $archive = "frostbuild-$env:GITHUB_REF_NAME-$hostTriple"
          New-Item -ItemType Directory -Force -Path "dist/$archive" | Out-Null
          Copy-Item target/release/frost.exe,target/release/frostd.exe -Destination "dist/$archive/"
          Copy-Item README.md,LICENSE -Destination "dist/$archive/"
          & "dist/$archive/frost.exe" --version
          Compress-Archive -Path "dist/$archive" -DestinationPath "dist/$archive.zip"
          Remove-Item "dist/$archive" -Recurse
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-windows
          path: dist/*.zip
          if-no-files-found: error

  publish:
    needs: [linux-musl, macos, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Create checksums
        shell: bash
        run: (cd dist && sha256sum frostbuild-* > SHA256SUMS)
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true
          files: dist/*
