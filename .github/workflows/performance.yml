name: Performance
on:
  pull_request:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - run: cargo build --release --locked
      - name: Reproducible smoke/full benchmark
        env:
          FROST_BENCH_SIZES: ${{ github.event_name == 'schedule' && '1000,10000' || '100' }}
          FROST_BENCH_ITERATIONS: ${{ github.event_name == 'schedule' && '5' || '3' }}
        run: ./frost-bench run --suite standard --tools frost,ninja,make --sizes "$FROST_BENCH_SIZES" --iterations "$FROST_BENCH_ITERATIONS" --jobs 2 --out bench-result.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-${{ github.sha }}
          path: bench-result.json
