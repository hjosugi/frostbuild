name: Performance
on:
  pull_request:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - run: cargo build --release --locked
      - name: Reproducible smoke/full benchmark
        env:
          FROST_BENCH_SIZES: ${{ github.event_name == 'schedule' && '1000,10000' || '100' }}
          FROST_BENCH_ITERATIONS: ${{ github.event_name == 'schedule' && '5' || '3' }}
        run: ./frost-bench run --suite standard --tools frost,ninja,make --sizes "$FROST_BENCH_SIZES" --iterations "$FROST_BENCH_ITERATIONS" --jobs 2 --out bench-result.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-${{ github.sha }}
          path: bench-result.json
